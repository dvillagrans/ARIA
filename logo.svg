<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Fondo Editor/Terminal (Zinc 950) -->
  <rect width="400" height="400" fill="#09090B" rx="40"/>

  <!-- Retícula técnica ortogonal (Zinc 900) - representa la base pgvector -->
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#18181B" stroke-width="1"/>
  </pattern>
  <rect width="400" height="400" fill="url(#grid)" rx="40"/>

  <g transform="translate(0, 5)">
    <!-- Estructura Principal Continua (Flujo de datos y razonamiento) -->
    <!-- Sube, baja a la derecha, y cruza violentamente hacia la izquierda -->
    <path d="M 110 260 L 200 80 L 245 170 L 140 170" fill="none" stroke="#F4F4F5" stroke-width="28" stroke-linecap="square" stroke-linejoin="miter" stroke-miterlimit="4"/>

    <!-- Nodo de integración aislado (Microservicios inyectando al /ingest) -->
    <path d="M 270 220 L 290 260" fill="none" stroke="#F4F4F5" stroke-width="28" stroke-linecap="square"/>

    <!-- The Single Recommended Action / Prompt Cursor (Verde Terminal) -->
    <!-- Bloque sólido ubicado exactamente al final de la barra cruzada -->
    <rect x="98" y="156" width="28" height="28" fill="#10B981"/>
  </g>

  <!-- Tipografía Monospace (Estética Developer OS) -->
  <text x="200" y="335" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="28" font-weight="700" fill="#F4F4F5" text-anchor="middle" letter-spacing="14">ARIA</text>
  <text x="200" y="360" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" font-weight="500" fill="#52525B" text-anchor="middle" letter-spacing="6">PERSONAL OS</text>
</svg>
