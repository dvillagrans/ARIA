services:
  fastapi:
    image: ghcr.io/dvillagrans/aria-backend:latest
    container_name: aria-fastapi
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
