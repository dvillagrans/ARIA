services:
  fastapi:
    image: ghcr.io/dvillagrans/aria-backend:latest
    container_name: aria-fastapi
    env_file: .env
    expose:
      - "8000"
    labels:
      - "proxy.aliases=aria-api"
      - "proxy.network=aria_default"
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    driver: bridge
